name: Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Create .env file
        run: |
          cat > .env << 'EOF'
          DB_HOST=mysql
          DB_PORT=3306
          DB_NAME=time_tracker
          MYSQL_USER=app_user
          MYSQL_ROOT_PASSWORD=test_root_password
          MYSQL_DATABASE=time_tracker
          MYSQL_PASSWORD=test_password
          JWT_SECRET_KEY=ci-jwt-secret-key-that-is-at-least-64-characters-long-for-security
          TOKEN_DURATION_HOURS=48
          PORT=3000
          FLASK_DEBUG=false
          EOF

      - name: Run full test suite inside Docker
        run: ./run_tests.sh --compose

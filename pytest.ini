[pytest]
testpaths = test
python_files = test_*.py
python_classes = Test*
python_functions = test_*
addopts = 
    -v
    --tb=short
    --strict-markers
    -ra
markers =
    integration: Integration tests (requires database)
    e2e: End-to-end tests (requires running services)
    docker: Docker deployment tests
filterwarnings =
    ignore::DeprecationWarning
    ignore::PendingDeprecationWarning
